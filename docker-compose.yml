version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_practicaNestJS_db
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_practica
      MYSQL_USER: user_practica
      MYSQL_PASSWORD: root
    volumes:
      - ./mysql:/var/lib/mysql
    ports:
      - "3307:3306"
  
      